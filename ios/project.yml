name: VeloraMobile

options:
  bundleIdPrefix: com.sushil
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1
    DEVELOPMENT_TEAM: JZFVKGDPU4
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1

targets:
  Velora:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Velora
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: Velora listens only while you dictate so it can put your words on the clipboard.
        NSSpeechRecognitionUsageDescription: Velora converts your voice to text on this iPhone and copies the result to the clipboard.
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushil.velora.ios

  VeloraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Velora
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushil.velora.ios.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Velora:
    build:
      targets:
        Velora: all
        VeloraTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - VeloraTests
